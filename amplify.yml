# Amplify Hosting ビルド仕様 (monorepo: web/ 配下に Next.js アプリ)
# 公式ドキュメント: https://docs.aws.amazon.com/amplify/latest/userguide/monorepo-configuration.html
#
# 前提:
# - AWS Console の Amplify アプリで `AMPLIFY_MONOREPO_APP_ROOT=web` が自動セットされる
# - 環境変数 `AMPLIFY_OUTPUTS_B64` に Sandbox 環境の amplify_outputs.json を base64 化したものを設定する
#   ローカルで `base64 -w0 amplify_outputs.json` の出力を Amplify Console に貼り付ける
# - Sandbox を再デプロイした際は AMPLIFY_OUTPUTS_B64 も更新が必要 (docs/knowledge.md 参照)
#
# 出力: web/out/ の静的サイト (Next.js `output: 'export'` モード)
version: 1
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            # amplify_outputs.json を環境変数から復元してリポジトリルートに配置する
            # web/app/* は '../../amplify_outputs.json' で参照しているため、ビルドコンテキスト (web/) の親ディレクトリに置く
            - if [ -z "$AMPLIFY_OUTPUTS_B64" ]; then echo "ERROR AMPLIFY_OUTPUTS_B64 env var is not set in Amplify Console"; exit 1; fi
            - echo "$AMPLIFY_OUTPUTS_B64" | base64 -d > ../amplify_outputs.json
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: out
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
